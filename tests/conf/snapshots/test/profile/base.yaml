test:
  config:
    do_train: true
    do_eval: true
    show_sensor_output: false
    max_train_steps: 50
    max_eval_steps: 50
    max_total_steps: 400
    n_train_epochs: 1
    n_eval_epochs: 1
    model_name_or_path: ''
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    logging:
      monty_log_level: DETAILED
      monty_handlers:
      - ${monty.class:tbp.monty.frameworks.loggers.monty_handlers.BasicCSVStatsHandler}
      - ${monty.class:tbp.monty.frameworks.loggers.monty_handlers.DetailedJSONHandler}
      wandb_handlers: []
      python_log_level: INFO
      python_log_to_file: true
      python_log_to_stderr: true
      output_dir: ${path.expanduser:${oc.env:MONTY_LOGS}/projects/monty_runs/}
      run_name: ''
      resume_wandb_run: false
      wandb_id:
        _target_: wandb.util.generate_id
      wandb_group: debugging
    monty_config:
      monty_args:
        num_exploratory_steps: 1000
        min_eval_steps: 3
        min_train_steps: 3
        max_total_steps: 2500
      motor_system_config:
        motor_system_args:
          policy:
            action_sampler:
              actions:
              - ${monty.class:tbp.monty.frameworks.actions.actions.LookUp}
              - ${monty.class:tbp.monty.frameworks.actions.actions.LookDown}
              - ${monty.class:tbp.monty.frameworks.actions.actions.TurnLeft}
              - ${monty.class:tbp.monty.frameworks.actions.actions.TurnRight}
              _target_: tbp.monty.frameworks.actions.action_samplers.UniformlyDistributedSampler
            _target_: tbp.monty.frameworks.models.motor_policies.BasePolicy
            agent_id: ${monty.agent_id:agent_id_0}
        motor_system_class: ${monty.class:tbp.monty.frameworks.models.motor_system.MotorSystem}
      monty_class: ${monty.class:tbp.monty.frameworks.models.monty_base.MontyBase}
      learning_module_configs:
        learning_module_0:
          learning_module_class: ${monty.class:tests.unit.frameworks.models.fakes.learning_modules.FakeLearningModule}
          learning_module_args: {}
      sensor_module_configs:
        sensor_module_0:
          sensor_module_class: ${monty.class:tests.unit.frameworks.models.fakes.sensor_modules.FakeSensorModule}
          sensor_module_args:
            sensor_module_id: sensor_id_0
      sm_to_agent_dict:
        sensor_id_0: ${monty.agent_id:agent_id_0}
      sm_to_lm_matrix:
      - - 0
      lm_to_lm_matrix: null
      lm_to_lm_vote_matrix: null
    env_interface_config:
      env_init_args:
        objects:
        - name: coneSolid
          position:
          - 0.0
          - 1.5
          - -0.1
        scene_id: null
        seed: 42
        data_path: null
        agents:
          agent_type: ${monty.class:tbp.monty.simulators.habitat.agents.SingleSensorAgent}
          agent_args:
            agent_id: ${monty.agent_id:agent_id_0}
            sensor_id: sensor_id_0
            resolution:
            - 320
            - 240
      env_init_func: ${monty.class:tbp.monty.simulators.habitat.environment.HabitatEnvironment}
      transform: null
    train_env_interface_args:
      parent_to_child_mapping: null
      object_init_sampler:
        _target_: tbp.monty.frameworks.environments.object_init_samplers.Default
      object_names:
      - capsule3DSolid
      - coneSolid
      - cubeSolid
    eval_env_interface_args:
      parent_to_child_mapping: null
      object_init_sampler:
        _target_: tbp.monty.frameworks.environments.object_init_samplers.Default
      object_names:
      - coneSolid
      - cubeSolid
      - cylinderSolid
    train_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
    eval_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
  _target_: tests.integration.frameworks.experiments.profile_experiment_mixin_test.ProfiledExperiment
