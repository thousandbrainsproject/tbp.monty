# @package experiment.config.monty_config.learning_modules

defaults:
  - hypotheses_updater/burst_sampling_10nn@learning_module_0
  - hypotheses_updater/burst_sampling_10nn@learning_module_1
  - hypotheses_updater/burst_sampling_10nn@learning_module_2

learning_module_0:
  _target_: tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM
  feature_weights:
    patch_0:
      hsv: ${np.array:[1, 0.5, 0.5]}
      pose_vectors: ${np.array:[0, 2, 1]}
  tolerances:
    patch_0:
      hsv: ${np.array:[0.1, 0.2, 0.2]}
  max_match_distance: 0.001
  x_percent_threshold: 20
  evidence_threshold_config: all
  max_graph_size: 0.1
  num_model_voxels_per_dim: 100
  object_evidence_threshold: 5
  # gsg:
  #   _target_: tbp.monty.frameworks.models.goal_generation.EvidenceGoalGenerator
  #   goal_tolerances:
  #     location: 0.15
  #   elapsed_steps_factor: 10
  #   min_post_goal_success_steps: 20
  #   x_percent_scale_factor: 0.75
  #   desired_object_distance: 0.03
  #   wait_growth_multiplier: 1

learning_module_1:
  _target_: tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM
  feature_weights:
    patch_1:
      pose_vectors: ${np.ones:3}
      principal_curvatures_log: ${np.ones:2}
  tolerances:
    patch_1:
      principal_curvatures_log: ${np.ones:2}
  max_match_distance: 0.01
  x_percent_threshold: 20
  evidence_threshold_config: all
  max_graph_size: 0.3
  num_model_voxels_per_dim: 100
  object_evidence_threshold: 20
  # gsg:
  #   _target_: tbp.monty.frameworks.models.goal_generation.EvidenceGoalGenerator
  #   goal_tolerances:
  #     location: 0.15
  #   elapsed_steps_factor: 10
  #   min_post_goal_success_steps: 20
  #   x_percent_scale_factor: 0.75
  #   desired_object_distance: 0.03
  #   wait_growth_multiplier: 1

learning_module_2:
  _target_: tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM
  tolerances:
    patch_2:
      hsv: ${np.array:[0.1, 0.2, 0.2]}
      principal_curvatures_log: ${np.ones:2}
    learning_module_0:
      object_id: 1
    learning_module_1:
      object_id: 1
  feature_weights:
    patch_2:
      hsv: ${np.array:[1, 0.5, 0.5]}
      pose_vectors: ${np.ones:3}
      principal_curvatures_log: ${np.ones:2}
    learning_module_0:
      object_id: 1
    learning_module_1:
      object_id: 1
  max_match_distance: 0.001
  x_percent_threshold: 20
  evidence_threshold_config: all
  max_graph_size: 0.4
  num_model_voxels_per_dim: 200
  max_nodes_per_graph: 5000
  object_evidence_threshold: 20