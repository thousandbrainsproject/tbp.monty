# @package experiment.config

defaults:
  - motor_system: defaults
  - learning_module: displacement
  - sensor_module: defaults
  - connectivity: defaults

monty_config:
  monty_args:
    num_exploratory_steps: 1000
    min_eval_steps: 3
    min_train_steps: 3
    max_total_steps: 2500
  monty_class: ${monty.class:tbp.monty.frameworks.models.graph_matching.MontyForGraphMatching}
  motor_system:
    policy:
      use_goal_state_driven_actions: false

