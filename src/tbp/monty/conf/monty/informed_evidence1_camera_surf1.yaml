# @package experiment.config.monty_config

defaults:
  - motor_system: defaults
  - learning_module: evidence
  - sensor_module: camera_surf
  - connectivity: defaults
  - override motor_system/policy: surface_curvature_informed

monty_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.model.MontyForEvidenceGraphMatching}
monty_args:
  num_exploratory_steps: 1000
  min_eval_steps: ${constants.min_eval_steps}
  min_train_steps: 3
  max_total_steps: 2500
