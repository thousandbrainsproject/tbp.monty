# @package experiment.config.monty_config.sensor_modules

sensor_module_0:
  _target_: tbp.monty.frameworks.models.sensor_modules.CameraSM
  sensor_module_id: patch
  features:
  - pose_vectors
  - pose_fully_defined
  - on_object
  - object_coverage
  - rgba
  - hsv
  - principal_curvatures
  - principal_curvatures_log
  - gaussian_curvature
  - mean_curvature
  - gaussian_curvature_sc
  - mean_curvature_sc
  - ltp
  ltp_config:
    texture_extraction:
      local_ternary_pattern:
        n_neighbors: 8
        radius: 1.0
        threshold: 5.0
        method: uniform
  save_raw_obs: false
sensor_module_1:
  _target_: tbp.monty.frameworks.models.sensor_modules.Probe
  sensor_module_id: view_finder
  save_raw_obs: false
