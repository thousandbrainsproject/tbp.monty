  agents:
    agent_args:
      agent_id: ${monty.agent_id:agent_id_0}
      sensor_configs:
        patch:
          position:
            - 0.0
            - 0.0
            - 0.0
          rotation:
            - 1.0
            - 0.0
            - 0.0
            - 0.0
          resolution:
            - 64
            - 64
          zoom: 10.0
        view_finder:
          position:
            - 0.0
            - 0.0
            - 0.0
          rotation:
            - 1.0
            - 0.0
            - 0.0
            - 0.0
          resolution:
            - 64
            - 64
          zoom: 1.0
      position:
        - 0.0
        - 1.5
        - 0.2
    agent_type: ${monty.class:tbp.monty.simulators.mujoco.agents.NoopAgent}
env_init_func: ${monty.class:tbp.monty.simulators.mujoco.environment.MuJoCoEnvironment}
