defaults:
  - supervised_pre_training_5lms
  - config/environment_interface/clear_train_env_interface_args@config
  - config/environment_interface/per_object@config.train_env_interface_args
  - config/environment_interface/ycb/shuffled_objects@config.train_env_interface_args.object_names

config:
  logging:
    run_name: supervised_pre_training_5lms_all_objects
  train_env_interface_args:
    object_init_sampler:
      _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
      rotations: ${benchmarks.rotations_all}
    positioning_procedures:
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:view_finder}
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:patch_0}
        allow_translation: false
        max_orientation_attempts: 3

