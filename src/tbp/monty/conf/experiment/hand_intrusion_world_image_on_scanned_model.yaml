defaults:
  - world_image_on_scanned_model
  - config/environment/clear_env_interface_config@config
  - config/environment/world_image@config.env_interface_config
  - config/environment/init_args/clear_env_init_args@config.env_interface_config
  - config/environment/init_args/monty_world_hand_intrusion_scenes@config.env_interface_config.env_init_args

config:
  logging:
    run_name: hand_intrusion_world_image_on_scanned_model
  eval_env_interface_args:
    positioning_procedures:
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:view_finder}
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:patch}
        allow_translation: false
        max_orientation_attempts: 3
