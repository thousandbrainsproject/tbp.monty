# @package _global_

defaults:
  - /monty: graph_exp10_e3_t3_tot2500
  - /monty/motor_system_config: test_look_at_goal
  - /monty/learning_module: displacement_1lm
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /environment: habitat_dist_agent
  - /env_interface: test_eval_1obj_cube
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0
  - /logging: detailed_debug_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 1
    max_eval_steps: 10
    max_total_steps: 10
    n_train_epochs: 0
    n_eval_epochs: 1
    model_name_or_path: ""
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    logging:
      run_name: debug_look_at_goal

    monty_config:
        sensor_module_configs:
            sensor_module_1:
              sensor_module_class: ${monty.class:tbp.monty.frameworks.models.salience.sensor_module.SalienceSM}
              sensor_module_args:
                sensor_module_id: view_finder
                save_raw_obs: true

