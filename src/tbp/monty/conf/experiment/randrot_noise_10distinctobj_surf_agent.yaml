# @package _global_

defaults:
  - /monty: ??
  - /env_interface: eval_random_rotation
  - /logging: basic
  - /environment: habitat_surf_agent
  - config: ??

config:
  model_name_or_path: ${constants.pretrained_dir}/surf_agent_1lm_10distinctobj/pretrained/
  n_eval_epochs: 10
  max_total_steps: 5000 # x4 max_eval_steps for surface-policy, x2.5 for feature-change SM
  logging:
    run_name: randrot_noise_10distinctobj_surf_agent
  monty_config:
    monty_args:
      min_eval_steps: ${constants.min_eval_steps}
    sensor_module_configs:
      sensor_module_1:
        sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.Probe}
        sensor_module_args:
          sensor_module_id: view_finder
          save_raw_obs: true
