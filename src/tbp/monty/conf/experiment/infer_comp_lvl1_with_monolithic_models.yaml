defaults:
  - config/infer_comp

_target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
config:
  model_name_or_path: ${benchmarks.pretrained_dir}/supervised_pre_training_objects_with_logos_lvl1_monolithic_models/pretrained/
  n_eval_epochs: ${benchmarks.rotations_all_count}
  logging:
    run_name: infer_comp_lvl1_with_monolithic_models
  eval_env_interface_args:
    positioning_procedures:
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:view_finder}
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:patch_0}
        allow_translation: false
        max_orientation_attempts: 3
