defaults:
  - base_config_10distinctobj_dist_agent
  - config/environment_interface/clear_eval_env_interface_args@config
  - config/environment_interface/per_object@config.eval_env_interface_args
  - config/environment_interface/ycb/shuffled_objects@config.eval_env_interface_args.object_names

config:
  model_name_or_path: ${benchmarks.pretrained_dir}/surf_agent_1lm_77obj/pretrained/
  n_eval_epochs: ${benchmarks.rotations_3_count}
  logging:
    run_name: base_77obj_dist_agent
  eval_env_interface_args:
    positioning_procedures:
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:view_finder}
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: ${monty.agent_id:agent_id_0}
        sensor_id: ${monty.sensor_id:patch}
        allow_translation: false
        max_orientation_attempts: 3
    object_init_sampler:
      _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
      rotations: ${benchmarks.rotations_3}
