# @package _global_

defaults:
  - /monty: evidencegraph_exp1000_emin_t3_tot2500
  - /monty/motor_system_config: naive_scan_1
  - /monty/learning_module: evidence_3lm_heterarchy
  - /monty/sensor_module: 3sm_2d3d_dist
  - /monty/connectivity: 3lm_3sm_heterarchy
  - /environment: habitat_dist_agent_sensors3
  - /env_interface: train_objects_with_stickers_2d_children_predefined
  - /env_interface/positioning_procedures_train: getgoodview_viewfinder_patch0
  - /env_interface/transform: missing_depthto3d_sensor4
  - /logging: silent_info_train

constants:
  zoom: 30
  blur_sigma: 5

experiment:
  _target_: tbp.monty.frameworks.experiments.pretraining_experiments.MontySupervisedObjectPretrainingExperiment
  config:
    show_sensor_output: false
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: 7
    n_eval_epochs: 7
    model_name_or_path: ${path.expanduser:${oc.env:MONTY_MODELS}/3d_sensor/supervised_pre_training_objects_with_stickers_3d_children/pretrained/}
    min_lms_match: 1
    seed: 42
    supervised_lm_ids:
      - learning_module_0
    logging:
      run_name: supervised_pre_training_objects_with_stickers_2d_children
      output_dir: ${path.expanduser:${oc.env:MONTY_MODELS}/2d_sensor}
    environment:
      env_init_args:
        data_path: ${path.expanduser:${oc.env:MONTY_DATA}/habitat/objects/compositional_objects}
      transform:
        - _target_: tbp.monty.frameworks.environment_utils.transforms.GaussianBlurRGB
          agent_id: agent_id_0
          sigma: ${constants.blur_sigma}
          sensor_ids: [ patch_0 ]
        - _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
          agent_id: agent_id_0
          max_depth: 1
        - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
          agent_id: agent_id_0
          sensor_ids: [ patch_0, patch_1, patch_2, view_finder ]
          resolutions:
            - [ 64, 64 ]
            - [ 64, 64 ]
            - [ 64, 64 ]
            - [ 64, 64 ]
          world_coord: true
          zooms: [ 30.0, 10.0, 5.0, 1.0 ]
          get_all_points: true
          use_semantic_sensor: false
