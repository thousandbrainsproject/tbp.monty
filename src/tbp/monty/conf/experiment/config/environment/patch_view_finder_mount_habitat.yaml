defaults:
  - init_args/patch_view_mount@env_init_args

env_init_func: ${monty.class:tbp.monty.simulators.habitat.environment.HabitatEnvironment}
# TODO: Some values are hardcoded, should come from env_init_args[agents][0].agent_args
transform:
  - _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
    agent_id: ${monty.agent_id:agent_id_0} # env_init_args[agents][0].agent_args.agent_id
    max_depth: 1
  - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
    agent_id: ${monty.agent_id:agent_id_0}
    sensor_configs:
      - sensor_id: patch
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: view_finder
        resolution: [64, 64]
        zoom: 1.0
        hfov: 90.0
    world_coord: true
    get_all_points: true
    use_semantic_sensor: false
