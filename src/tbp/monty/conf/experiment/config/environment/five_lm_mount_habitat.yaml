defaults:
  - multi_lm_mount_habitat
  - init_args/clear_env_init_args@
  - init_args/five_lm_mount@env_init_args

# TODO: Some values are hardcoded, should come from env_init_args[agents][0].agent_args
transform:
  - _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
    agent_id: ${monty.agent_id:agent_id_0} # env_init_args[agents][0].agent_args.agent_id
    max_depth: 1
  - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
    agent_id: ${monty.agent_id:agent_id_0}
    sensor_configs:
      - sensor_id: patch_0
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: patch_1
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: patch_2
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: patch_3
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: patch_4
        resolution: [64, 64]
        zoom: 10.0
        hfov: 90.0
      - sensor_id: view_finder
        resolution: [64, 64]
        zoom: 1.0
        hfov: 90.0
    world_coord: true
    get_all_points: true
    use_semantic_sensor: false
