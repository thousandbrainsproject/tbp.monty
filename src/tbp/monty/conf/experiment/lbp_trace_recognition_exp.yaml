defaults:
  - config/eval
  - config/logging/detailed_evidence_lm # changed to turn off wandb logging and increase logging for debugging
  - config/monty/patch_and_view_lbp_trace@config.monty_config
  - config/monty/learning_modules/clear_learning_module_configs@config.monty_config
  - config/monty/learning_modules/lower_max_nneighbors_1lm@config.monty_config.learning_module_configs
  - config/monty/args/clear_monty_args@config.monty_config
  - config/monty/args/defaults@config.monty_config.monty_args
  - config/environment/patch_view_finder_mount_habitat@config.env_interface_config
  - config/environment_interface/per_object@config.eval_env_interface_args
  - config/environment_interface/ycb/distinct_objects@config.eval_env_interface_args.object_names

_target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
config:
  model_name_or_path: /home/tristan_weldon/tbp/results/monty/pretrained_models/my_trained_models/supervised_pre_training_lbp_trace/pretrained
  n_eval_epochs: ${benchmarks.rotations_all_count}
  logging:
    wandb_group: benchmark_experiments

    # Comment in for quick debugging (turns off wandb and increases logging)
    # wandb_handlers: []
    # python_log_level: DEBUG
    # FIXME: Probably shouldn't import config/logging/parallel_evidence_lm in the first place
    output_dir: ${path.expanduser:${oc.env:MONTY_LOGS}/projects/monty_runs}
    run_name: lbp_trace_recognition_exp
  monty_config:
    monty_args:
      min_eval_steps: ${benchmarks.min_eval_steps}
  eval_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.InformedEnvironmentInterface}
  eval_env_interface_args:
    object_init_sampler:
      _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
      rotations: ${benchmarks.rotations_all}
  